<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 감정 일기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary-color: #6366f1;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .app-container {
      background-color: var(--card-bg);
      width: 100%;
      max-width: 480px;
      padding: 35px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.04);
      box-sizing: border-box;
    }
    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-top: 0;
      margin-bottom: 25px;
      text-align: center;
      color: var(--text-main);
    }
    textarea {
      width: 100%;
      height: 140px;
      padding: 18px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      resize: none;
      font-size: 16px;
      font-family: inherit;
      box-sizing: border-box;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      background-color: #f8fafc;
    }
    textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
    textarea::placeholder {
      color: #94a3b8;
    }
    .button-group {
      display: flex;
      gap: 15px;
      margin-bottom: 35px;
    }
    button {
      flex: 1;
      padding: 14px 0;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    button:active {
      transform: scale(0.97);
    }
    .btn-voice {
      background-color: #eef2ff;
      color: var(--primary-color);
    }
    .btn-voice:hover {
      background-color: #e0e7ff;
    }
    .btn-analyze {
      background-color: var(--primary-color);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .btn-analyze:hover {
      background-color: #4f46e5;
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }
    .ai-response-section h2 {
      font-size: 18px;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 15px;
      color: var(--text-main);
    }
    .ai-response-box {
      background-color: #f1f5f9;
      padding: 24px;
      border-radius: 16px;
      color: var(--text-muted);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.6;
      font-size: 15px;
      border: 1px solid #e2e8f0;
    }
    .history-section {
      margin-top: 40px;
      border-top: 2px dashed #e2e8f0;
      padding-top: 20px;
    }
    .history-section h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-main);
      text-align: center;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .history-card {
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      text-align: left;
    }
    .history-date {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 10px;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 5px;
    }
    .history-user {
      font-size: 14px;
      color: var(--text-main);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .history-ai {
      font-size: 14px;
      color: var(--primary-color);
      background-color: #eef2ff;
      padding: 12px;
      border-radius: 12px;
      line-height: 1.5;
    }
    .empty-history {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      padding: 20px 0;
    }
    
    /* Login Screen Styles */
    .login-container {
      background-color: var(--card-bg);
      width: 100%;
      max-width: 400px;
      padding: 40px 35px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.04);
      box-sizing: border-box;
      text-align: center;
    }
    .login-container h1 {
      font-size: 28px;
      margin-bottom: 30px;
      color: var(--primary-color);
      font-weight: 800;
    }
    .auth-input {
      width: 100%;
      height: 50px;
      padding: 0 18px;
      margin-bottom: 15px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.3s;
      background-color: #f8fafc;
    }
    .auth-input:focus {
      outline: none;
      border-color: var(--primary-color);
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
    .auth-input::placeholder {
      color: #94a3b8;
    }
    .auth-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 25px;
    }
    .btn-login {
      background-color: var(--primary-color);
      color: white;
      flex: 2;
    }
    .btn-login:hover {
      background-color: #4f46e5;
    }
    .btn-signup {
      background-color: #eef2ff;
      color: var(--primary-color);
      flex: 1;
    }
    .btn-signup:hover {
      background-color: #e0e7ff;
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin-bottom: 25px;
      color: #94a3b8;
      font-size: 14px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e2e8f0;
    }
    .divider span {
      padding: 0 15px;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background-color: white;
      color: #333;
      border: 1px solid #e2e8f0;
      width: 100%;
      padding: 14px 0;
      font-weight: 600;
    }
    .btn-google:hover {
      background-color: #f8fafc;
    }
  </style>
</head>
<body>
  <!-- 로그인 화면 -->
  <div class="login-container" id="loginContainer">
    <h1>AI 감정일기</h1>
    <div class="login-form">
      <input type="email" id="emailInput" placeholder="이메일" class="auth-input">
      <input type="password" id="passwordInput" placeholder="비밀번호" class="auth-input">
      
      <div class="auth-buttons">
        <button class="btn-login" id="loginBtn">로그인</button>
        <button class="btn-signup" id="signupBtn">회원가입</button>
      </div>
      
      <div class="divider">
        <span>또는</span>
      </div>
      
      <button class="btn-google" id="googleLoginBtn">
        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google로 로그인
      </button>
    </div>
  </div>

  <!-- 메인 일기장 화면 (초기엔 숨김 처리) -->
  <div class="app-container" id="appContainer" style="display: none;">
    <h1>오늘 하루는 어땠나요?</h1>
    <textarea id="diaryInput" placeholder="이곳에 오늘 있었던 일이나 느낀 감정을 편하게 적어주세요..."></textarea>
    
    <div class="button-group">
      <button class="btn-voice" id="voiceBtn">🎤 음성으로 입력하기</button>
      <button class="btn-analyze" id="analyzeBtn">✨ 분석 요청하기</button>
    </div>

    <div class="ai-response-section">
      <h2>AI의 답변</h2>
      <div class="ai-response-box" id="aiResponse">
        여기에 AI의 답변이 표시됩니다.
      </div>
    </div>

    <div class="history-section">
      <h2>나의 일기 히스토리 📚</h2>
      <div class="history-list" id="historyList">
        <div class="empty-history">불러오는 중...</div>
      </div>
    </div>
  </div>

  <script>
    // Supabase 클라이언트 초기화 설정
    let supabase;

    // 페이지 로드 시 환경변수 설정용 API 호출하여 Supabase 초기화
    async function initSupabase() {
      try {
        const res = await fetch('/api/config');
        if (!res.ok) {
            console.warn('로컬 Live Server 환경이므로 서버 API를 불러올 수 없습니다.');
            return;
        }
        
        // 올바른 JSON 응답인지 확인 (HTML 에러 페이지 방어)
        const contentType = res.headers.get("content-type");
        if (contentType && contentType.indexOf("application/json") !== -1) {
          const config = await res.json();
          if (config.url && config.key) {
            supabase = window.supabase.createClient(config.url, config.key);
          }
        } else {
            console.warn('API 응답이 JSON 형식이 아닙니다 (URL 에러 가능성)');
        }
      } catch (e) {
        console.warn("Supabase 환경 변수를 가져오는데 실패했습니다.", e);
      }
    }
    
    // 즉시 인스턴스 초기화 실행
    initSupabase();

    // 로그인 관련 DOM 요소
    const loginContainer = document.getElementById('loginContainer');
    const appContainer = document.getElementById('appContainer');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');

    // 로그인 성공 시 메인 화면으로 이동하는 함수
    function performLogin() {
      loginContainer.style.display = 'none';
      appContainer.style.display = 'block';
      fetchHistory(); // 화면이 전환되면 히스토리를 불러옴
    }

    loginBtn.addEventListener('click', () => {
      if (emailInput.value && passwordInput.value) {
        // 임시로 그냥 넘어가도록 (나중에 로그인 로직 추가)
        performLogin();
      } else {
        alert('이메일과 비밀번호를 입력해주세요.');
      }
    });

    googleLoginBtn.addEventListener('click', () => {
      performLogin();
    });

    // 회원가입 버튼 로직 (Supabase auth.signUp 호출)
    signupBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        alert('회원가입을 위해 이메일과 비밀번호를 모두 입력해주세요.');
        return;
      }
      
      if (!supabase) {
        alert('Supabase 연결 설정이 완료되지 않았습니다.');
        return;
      }

      // UI 텍스트 변경
      const originalText = signupBtn.innerHTML;
      signupBtn.innerHTML = '진행 중...';
      signupBtn.disabled = true;

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password
        });

        if (error) {
          throw error;
        }

        alert('가입확인 이메일을 확인해주세요!');
      } catch (error) {
        alert('회원가입 실패: ' + error.message);
      } finally {
        signupBtn.innerHTML = originalText;
        signupBtn.disabled = false;
      }
    });

    // 메인 앱 DOM 요소
    const diaryInput = document.getElementById('diaryInput');
    const voiceBtn = document.getElementById('voiceBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const aiResponse = document.getElementById('aiResponse');
    
    // 저장된 데이터 불러오기 (페이지 로드 완료 시)
    window.addEventListener('DOMContentLoaded', () => {
      const savedDiary = localStorage.getItem('diaryText');
      const savedResponse = localStorage.getItem('aiResponse');
      
      if (savedDiary) {
        diaryInput.value = savedDiary;
      }
      if (savedResponse) {
        aiResponse.innerHTML = savedResponse;
      }
      
      // 이제 히스토리는 로그인 완료 후에만 불러옵니다.
    });

    // 히스토리 데이터를 가져와 화면에 렌더링하는 함수
    async function fetchHistory() {
      const historyList = document.getElementById('historyList');
      try {
        const res = await fetch('/api/history');
        if (!res.ok) throw new Error('히스토리 로드 실패');
        
        const data = await res.json();
        const items = data.result;

        if (!items || items.length === 0) {
          historyList.innerHTML = '<div class="empty-history">아직 저장된 일기가 없습니다.</div>';
          return;
        }

        historyList.innerHTML = ''; // 초기화
        
        items.forEach(item => {
          // 날짜 포맷팅
          const dateObj = new Date(item.timestamp);
          const dateStr = dateObj.toLocaleString('ko-KR', { 
            year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit' 
          });

          const formattedAi = item.aiResponse ? item.aiResponse.replace(/\n/g, '<br>') : '답변 없음';

          const card = document.createElement('div');
          card.className = 'history-card';
          card.innerHTML = `
            <div class="history-date">📅 ${dateStr}</div>
            <div class="history-user">${item.userText}</div>
            <div class="history-ai"><strong>AI:</strong><br>${formattedAi}</div>
          `;
          historyList.appendChild(card);
        });

      } catch (e) {
        console.error(e);
        historyList.innerHTML = '<div class="empty-history">히스토리를 불러올 수 없습니다.</div>';
      }
    }

    // 사용자가 직접 타이핑할 때 일기 내용 저장
    diaryInput.addEventListener('input', () => {
      localStorage.setItem('diaryText', diaryInput.value);
    });

    // Web Speech API 지원 여부 확인
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = true; // 계속 들을지 여부
      recognition.interimResults = true; // 중간 결과를 보여줄지 여부
      recognition.lang = 'ko-KR'; // 한국어 설정
      
      let isRecording = false;

      // 음성 인식 시작 이벤트
      recognition.onstart = function() {
        isRecording = true;
        voiceBtn.innerHTML = '🔴 녹음 중지하기';
        voiceBtn.style.backgroundColor = '#fee2e2'; // 부드러운 붉은색
        voiceBtn.style.color = '#ef4444';
      };

      // 음성 인식 결과 이벤트
      recognition.onresult = function(event) {
        let interimTranscript = '';
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {
           if (event.results[i].isFinal) {
             finalTranscript += event.results[i][0].transcript;
           } else {
             interimTranscript += event.results[i][0].transcript;
           }
        }
        
        // 최종 변환된 텍스트를 textarea에 추가
        if (finalTranscript) {
          diaryInput.value += finalTranscript + ' ';
          localStorage.setItem('diaryText', diaryInput.value);
        }
      };

      // 음성 인식 종료 이벤트
      recognition.onend = function() {
        // 만약 버튼을 직접 누르지 않았는데 끝났다면(예: 말이 길게 멈춘 경우) 버튼 상태 원상복구
        if (isRecording) {
          isRecording = false;
          voiceBtn.innerHTML = '🎤 음성으로 입력하기';
          voiceBtn.style.backgroundColor = '#eef2ff';
          voiceBtn.style.color = 'var(--primary-color)';
        }
      };

      recognition.onerror = function(event) {
        console.error('음성 인식 에러:', event.error);
        if(event.error === 'not-allowed') {
          alert('마이크 접근 권한을 허용해주세요.');
        }
      };

      // 버튼 클릭 이벤트 리스너
      voiceBtn.addEventListener('click', function() {
        if (!isRecording) {
          recognition.start();
        } else {
          recognition.stop();
          isRecording = false;
          voiceBtn.innerHTML = '🎤 음성으로 입력하기';
          voiceBtn.style.backgroundColor = '#eef2ff';
          voiceBtn.style.color = 'var(--primary-color)';
        }
      });
    } else {
      voiceBtn.addEventListener('click', function() {
        alert('이 브라우저는 음성 인식 기능을 지원하지 않습니다. Chrome 브라우저를 이용해주세요.');
      });
    }

    // Gemini API 분석 요청 로직
    analyzeBtn.addEventListener('click', async function() {
      const text = diaryInput.value.trim();
      if (!text) {
        alert('먼저 일기 내용을 입력해주세요.');
        return;
      }

      // UI 상태 변경: 로딩 중
      analyzeBtn.disabled = true;
      analyzeBtn.innerHTML = '⏳ 분석 중...';
      aiResponse.innerHTML = 'AI가 일기를 읽고 분석하고 있습니다. 잠시만 기다려주세요...';

      try {
        // Vercel Serverless Function 호출
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text })
        });

        if (!response.ok) {
          throw new Error(`서버 오류: ${response.status}`);
        }

        const data = await response.json();
        const aiText = data.result;
        
        // 결과 표시 (줄바꿈 처리)
        const formattedResponse = aiText.replace(/\n/g, '<br>');
        aiResponse.innerHTML = formattedResponse;
        
        // AI 답변을 로컬 스토리지에 저장
        localStorage.setItem('aiResponse', formattedResponse);

      } catch (error) {
        console.error('API 요청 에러:', error);
        aiResponse.innerHTML = '⚠️ 오류 발생: ' + error.message;
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.innerHTML = '✨ 분석 요청하기';
        
        // 분석 완료 후, 히스토리 목록 새로고침 (새로 저장된 내용 반영 목적)
        fetchHistory();
      }
    });
  </script>
</body>
</html>
